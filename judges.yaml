judges:
  bare:
    description: "Bare model, no face"
    model: claude-sonnet-4-6
    provider: anthropic
    face: null

  judge-face:
    description: "Judge face compiled from source doc via Faces platform"
    model: claude-sonnet-4-6
    provider: anthropic
    face: "judge@claude-sonnet-4-6"

problems:
  - "000"
  - "001"

budget:
  token_budget: 20000  # informational — passed to agent in prompt; not enforced by hermes itself
  wall_budget: 300     # hard ceiling in seconds — run.sh kills agent with `timeout` if exceeded
                       # override per-run: ./run.sh --token-budget 50000 --wall-budget 600
