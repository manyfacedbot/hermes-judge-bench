judges:
  bare:
    description: "Bare model, no face"
    model: claude-sonnet-4-6
    provider: anthropic
    face: null

  judge-face:
    description: "Judge face compiled from source doc via Faces platform"
    model: claude-sonnet-4-6
    provider: anthropic
    face: "judge@claude-sonnet-4-6"

problems:
  - "000"
  - "001"

budget:
  max_turns: 10        # hard ceiling on agent tool-calling iterations
  token_budget: 20000  # informational — passed to agent in prompt
